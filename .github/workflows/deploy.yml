name: deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {} # можно запускать вручную из вкладки Actions

# Не даём двум деплоям идти одновременно на одну ВМ.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # --- Гейт качества: без зелёных проверок деплой не поедет ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # --- Деплой на cloud.ru ВМ по SSH ---
  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Настроить SSH-ключ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Синхронизировать код на ВМ (~/pms)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.data' \
            --exclude 'dist' \
            --exclude '.idea' \
            --exclude '.env' \
            ./ "$SSH_USER@$SSH_HOST:pms/"

      - name: Записать .env из секрета PROD_ENV
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          # Секрет идёт через stdin (не через argv) → не светится в логах/процессах.
          printf '%s' "$PROD_ENV" \
            | ssh -i ~/.ssh/id_deploy "$SSH_USER@$SSH_HOST" \
                'mkdir -p ~/pms && cat > ~/pms/.env'

      - name: Развернуть (ensure-docker + compose up --build)
        run: |
          ssh -i ~/.ssh/id_deploy "$SSH_USER@$SSH_HOST" \
            'APP_DIR="$HOME/pms" bash "$HOME/pms/deploy/remote-deploy.sh"'
